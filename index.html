<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#f4f4f2">
<title>Unified Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#f4f4f2;min-height:100dvh}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:#1a1a1a;text-rendering:optimizeLegibility}
input,button,textarea{font-family:inherit;border:none;outline:none;background:none}
button{cursor:pointer}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:3px}
::-webkit-scrollbar-track{background:transparent}
.skel{background:linear-gradient(90deg,#eee 25%,#e0e0de 50%,#eee 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-20px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:14px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
import{createClient}from'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
import{html,render,useState,useEffect,useRef,useMemo}from'https://unpkg.com/htm/preact/standalone.module.js';

const sb=createClient('https://qxbnjemssqjczexevnff.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4Ym5qZW1zc3FqY3pleGV2bmZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjUyMDYsImV4cCI6MjA5MTQwMTIwNn0.dZLv-Cgar7FaSSbyZBFcWq1JGQrp-v8UQ-CNjN3Fm2Y');

const C={
  bg:'#f4f4f2',card:'#fff',text:'#1a1a1a',muted:'#888',border:'#e5e5e1',
  kcal:'#205781',protein:'#006D77',carbs:'#4F959D',fat:'#7AB2B2',
  workout:'#A42059',rest:'#7AB2B2',friday:'#205781',
  fettmasse:'#D4A017',muskelmasse:'#C0392B',gewicht:'#95a5a6',
  warnMid:'#623c6d',warnHigh:'#A42059',good:'#1f7a4d',
};

const localDate=(d=new Date())=>{const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${dd}`};
const addDays=(ds,n)=>{const d=new Date(ds+'T12:00:00');d.setDate(d.getDate()+n);return localDate(d)};
const parseDateLocal=(ds)=>new Date(ds+'T12:00:00');
const fmtDateFull=(ds)=>{const d=parseDateLocal(ds);const wd=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'][d.getDay()];const mn=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'][d.getMonth()];return{wd,short:['So','Mo','Di','Mi','Do','Fr','Sa'][d.getDay()],dom:d.getDate(),full:`${d.getDate()}. ${mn} ${d.getFullYear()}`}};
const isToday=(ds)=>ds===localDate();
const round1=(v)=>Math.round(v*10)/10;
const fmtDe=(v)=>v!=null?String(v).replace('.',','):'—';
const DAY_TYPE_LABEL={workout:'Workout',rest:'Rest',friday:'Friday'};

/* DB */
async function dbGetDay(uid,date){const{data}=await sb.from('daily_tracking').select('*').eq('user_id',uid).eq('date',date).maybeSingle();return data}
async function dbGetPrevDay(uid,date){const{data}=await sb.from('daily_tracking').select('weight_kg,body_fat_pct,muscle_pct,fat_mass_kg,muscle_mass_kg').eq('user_id',uid).lt('date',date).not('weight_kg','is',null).order('date',{ascending:false}).limit(1).maybeSingle();return data}
async function dbGetWeek(uid,startDate,endDate){const{data}=await sb.from('daily_tracking').select('date,day_type,weight_kg').eq('user_id',uid).gte('date',startDate).lte('date',endDate).order('date');return data||[]}
async function dbUpsertBodyComp(uid,date,weight,fatPct,muscPct){const{data,error}=await sb.from('daily_tracking').upsert({user_id:uid,date,weight_kg:weight,body_fat_pct:fatPct,muscle_pct:muscPct,updated_at:new Date().toISOString()},{onConflict:'user_id,date',ignoreDuplicates:false}).select().maybeSingle();if(error)console.error('upsert error',error);return data}
async function dbUpsertNotes(uid,date,notes){await sb.from('daily_tracking').upsert({user_id:uid,date,notes,updated_at:new Date().toISOString()},{onConflict:'user_id,date',ignoreDuplicates:false})}
async function dbUpsertDayType(uid,date,dayType){await sb.from('daily_tracking').upsert({user_id:uid,date,day_type:dayType,updated_at:new Date().toISOString()},{onConflict:'user_id,date',ignoreDuplicates:false})}

/* UI Primitives */
function Card({children,padding=16,style={},onClick}){return html`<div onClick=${onClick} style=${{background:C.card,borderRadius:18,padding,boxShadow:'0 1px 0 rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.04)',...style}}>${children}</div>`}
function SectionLabel({children,right}){return html`<div style=${{display:'flex',alignItems:'baseline',justifyContent:'space-between',padding:'20px 4px 8px',fontSize:13,fontWeight:600,letterSpacing:0.4,color:C.muted,textTransform:'uppercase'}}><span>${children}</span>${right?html`<span style=${{textTransform:'none',fontWeight:500,letterSpacing:0,color:C.muted}}>${right}</span>`:null}</div>`}
function NumInput({label,value,onChange,unit,step=0.1}){return html`<label style=${{display:'block'}}><div style=${{fontSize:13,fontWeight:600,color:C.muted,marginBottom:6}}>${label}</div><div style=${{display:'flex',alignItems:'baseline',background:'#fafaf8',border:'1px solid '+C.border,borderRadius:12,padding:'11px 10px',minWidth:0}}><input type=number inputMode=decimal step=${step} value=${value??''} onInput=${e=>onChange(e.target.value===''?null:parseFloat(e.target.value))} style=${{border:'none',background:'transparent',outline:'none',fontSize:19,fontWeight:600,color:C.text,width:'100%',minWidth:0,fontVariantNumeric:'tabular-nums',padding:0}}/><span style=${{fontSize:12,color:C.muted,marginLeft:3,flexShrink:0}}>${unit}</span></div></label>`}
function Delta({value,unit='kg',goodIfNegative=false}){if(value==null||isNaN(value))return null;const isN=Math.abs(value)<0.05;const pos=value>0;const isG=goodIfNegative?value<0:value>0;const color=isN?C.muted:(isG?C.good:C.warnHigh);const sign=isN?'±':(pos?'+':'−');const bg=isN?'#f0f0ee':(isG?'rgba(31,122,77,0.10)':'rgba(164,32,89,0.10)');return html`<span style=${{color,fontWeight:600,fontVariantNumeric:'tabular-nums',fontSize:13,background:bg,padding:'2px 8px',borderRadius:999}}>${sign}${Math.abs(value).toFixed(1)} ${unit}</span>`}
function FeedbackRow({label,value,unit,delta,goodIfNegative,color,subtle}){return html`<div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 12px',background:subtle?'#fafaf8':color+'10',borderRadius:10}}><div style=${{display:'flex',alignItems:'center',gap:10}}><div style=${{width:8,height:8,borderRadius:4,background:color}}></div><span style=${{fontSize:13,fontWeight:600,color:C.text}}>${label}</span></div><div style=${{display:'flex',alignItems:'baseline',gap:8}}><span style=${{fontSize:16,fontWeight:700,fontVariantNumeric:'tabular-nums'}}>${value!=null?fmtDe(value):'—'}<span style=${{fontSize:12,color:C.muted,fontWeight:500}}> ${unit}</span></span><${Delta} value=${delta} unit=${unit} goodIfNegative=${goodIfNegative}/></div></div>`}
function Segmented({value,onChange,options}){return html`<div style=${{display:'flex',background:'#ececea',borderRadius:11,padding:3,gap:2}}>${options.map(o=>{const sel=o.value===value;return html`<div key=${o.value} onClick=${()=>onChange(o.value)} style=${{flex:1,padding:'10px 12px',fontSize:14,fontWeight:sel?600:500,textAlign:'center',borderRadius:8,cursor:'pointer',background:sel?(o.color||'#fff'):'transparent',color:sel?(o.color?'#fff':C.text):C.muted,boxShadow:sel?'0 1px 2px rgba(0,0,0,0.06)':'none',transition:'all 0.15s',userSelect:'none'}}>${o.label}</div>`})}</div>`}
function DayTypePill({type}){const c=C[type]||C.muted;return html`<span style=${{fontSize:11,fontWeight:700,letterSpacing:0.5,textTransform:'uppercase',color:c,background:c+'1a',padding:'3px 8px',borderRadius:6}}>${DAY_TYPE_LABEL[type]||''}</span>`}
function MacroBar({label,current,target,color}){const pct=Math.min(150,(current/target)*100);const over=current>target;let wc=color;if(pct>110)wc=C.warnHigh;else if(pct>100)wc=C.warnMid;return html`<div style=${{marginBottom:10}}><div style=${{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:5}}><span style=${{fontWeight:600}}>${label}</span><span><span style=${{fontWeight:600,color:over?wc:C.text}}>${Math.round(current)}</span><span style=${{color:C.muted}}> / ${target}</span></span></div><div style=${{height:6,borderRadius:3,background:'#ececec',overflow:'hidden'}}><div style=${{height:'100%',width:Math.min(100,pct)+'%',background:wc,borderRadius:3,transition:'width 0.3s'}}></div></div></div>`}

/* Icons */
function NavIcon({name,active}){const c=active?'#1a1a1a':'#9b9b97';if(name==='sunrise')return html`<svg width=22 height=22 viewBox="0 0 24 24" fill=none stroke=${c} stroke-width=2 stroke-linecap=round stroke-linejoin=round><path d="M3 18h18M5 18a7 7 0 0114 0M12 3v3M5.6 7.6l1.4 1.4M18.4 7.6l-1.4 1.4M2 22h20"/></svg>`;if(name==='chart')return html`<svg width=22 height=22 viewBox="0 0 24 24" fill=none stroke=${c} stroke-width=2 stroke-linecap=round stroke-linejoin=round><path d="M3 3v18h18M7 14l3-3 3 3 5-5"/></svg>`;if(name==='table')return html`<svg width=22 height=22 viewBox="0 0 24 24" fill=none stroke=${c} stroke-width=2 stroke-linecap=round stroke-linejoin=round><rect x=3 y=4 width=18 height=16 rx=2/><path d="M3 10h18M9 4v16"/></svg>`;if(name==='cloud')return html`<svg width=22 height=22 viewBox="0 0 24 24" fill=none stroke=${c} stroke-width=2 stroke-linecap=round stroke-linejoin=round><path d="M16 16l-4-4-4 4M12 12v9"/><path d="M20 16.5A4.5 4.5 0 0017 8a6 6 0 00-11.7 1.5A4 4 0 006 17"/></svg>`;return null}
function IconChevL(){return html`<svg width=20 height=20 viewBox="0 0 24 24" fill=none stroke=currentColor stroke-width=2><path d="m15 18-6-6 6-6"/></svg>`}
function IconChevR(){return html`<svg width=20 height=20 viewBox="0 0 24 24" fill=none stroke=currentColor stroke-width=2><path d="m9 18 6-6-6-6"/></svg>`}

/* Toast */
function useToast(){const[msg,setMsg]=useState('');const[show,setShow]=useState(false);const t=useRef(null);const toast=(m)=>{setMsg(m);setShow(true);clearTimeout(t.current);t.current=setTimeout(()=>setShow(false),2500)};const el=html`<div class="toast ${show?'show':''}">${msg}</div>`;return{toast,ToastEl:el}}

/* Bottom Nav */
const TABS=[{id:'heute',label:'Heute',icon:'sunrise'},{id:'dashboard',label:'Dashboard',icon:'chart'},{id:'tabelle',label:'Tabelle',icon:'table'},{id:'import',label:'Import',icon:'cloud'}];
function BottomNav({active,onNav}){return html`<div style=${{position:'fixed',bottom:0,left:0,right:0,paddingBottom:'max(12px, env(safe-area-inset-bottom))',paddingTop:6,background:'linear-gradient(to top, rgba(244,244,242,0.95) 65%, rgba(244,244,242,0))',backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)',zIndex:100}}><div style=${{margin:'0 14px',background:'rgba(255,255,255,0.85)',backdropFilter:'blur(20px) saturate(180%)',WebkitBackdropFilter:'blur(20px) saturate(180%)',borderRadius:22,boxShadow:'0 1px 0 rgba(255,255,255,0.8) inset, 0 4px 16px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04)',border:'1px solid rgba(255,255,255,0.5)',display:'flex',padding:6}}>${TABS.map(t=>html`<div key=${t.id} onClick=${()=>onNav(t.id)} style=${{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'8px 4px',borderRadius:16,background:active===t.id?'rgba(26,26,26,0.05)':'transparent',cursor:'pointer',transition:'background 0.15s'}}><${NavIcon} name=${t.icon} active=${active===t.id}/><span style=${{fontSize:10,fontWeight:active===t.id?700:500,color:active===t.id?C.text:'#9b9b97',letterSpacing:0.2}}>${t.label}</span></div>`)}</div></div>`}

/* ═══════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════ */
function App(){
  const[user,setUser]=useState(null);const[authLd,setAuthLd]=useState(true);
  const[scr,setScr]=useState('heute');
  const{toast,ToastEl}=useToast();
  const[em,setEm]=useState('');const[pw,setPw]=useState('');const[aErr,setAErr]=useState('');

  useEffect(()=>{sb.auth.getSession().then(({data})=>{if(data.session?.user)setUser(data.session.user);setAuthLd(false)});
    const{data:l}=sb.auth.onAuthStateChange((_,s)=>setUser(s?.user||null));return()=>l.subscription.unsubscribe()},[]);

  if(authLd)return html`<div style=${{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100dvh',color:C.muted,fontSize:15}}>Laden...</div>`;

  if(!user){
    const doAuth=async()=>{setAErr('');const{error}=await sb.auth.signInWithPassword({email:em,password:pw});if(error)setAErr(error.message)};
    return html`<div style=${{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100dvh',padding:32,textAlign:'center'}}>
      <div style=${{marginBottom:40}}>
        <div style=${{width:64,height:64,background:'#f0f0ee',borderRadius:18,display:'inline-flex',alignItems:'center',justifyContent:'center',marginBottom:16}}>
          <svg width=28 height=28 viewBox="0 0 24 24" fill=none stroke=${C.text} stroke-width=2 stroke-linecap=round><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 5-5"/></svg>
        </div>
        <h1 style=${{fontSize:28,fontWeight:700,letterSpacing:'-0.6px'}}>Unified Tracker</h1>
        <p style=${{fontSize:13,color:C.muted,marginTop:6}}>Gewicht · Körperkomposition · Trends</p>
      </div>
      ${aErr?html`<div style=${{color:C.warnHigh,fontSize:13,marginBottom:12}}>${aErr}</div>`:null}
      <div style=${{width:'100%',maxWidth:340,display:'flex',flexDirection:'column',gap:12}}>
        <input type=email placeholder="Email" value=${em} onInput=${e=>setEm(e.target.value)} style=${{width:'100%',height:50,background:'#fafaf8',border:'1px solid '+C.border,borderRadius:12,padding:'0 16px',fontSize:15}}/>
        <input type=password placeholder="Passwort" value=${pw} onInput=${e=>setPw(e.target.value)} onKeyDown=${e=>{if(e.key==='Enter')doAuth()}} style=${{width:'100%',height:50,background:'#fafaf8',border:'1px solid '+C.border,borderRadius:12,padding:'0 16px',fontSize:15}}/>
        <button onClick=${doAuth} style=${{width:'100%',height:50,background:C.text,color:'#fff',borderRadius:12,fontSize:15,fontWeight:600}}>Einloggen</button>
      </div>
    </div>`;
  }

  return html`<div style=${{minHeight:'100dvh',background:C.bg}}>
    ${ToastEl}
    ${scr==='heute'?html`<${HeuteTab} user=${user} toast=${toast} onSettings=${()=>setScr('settings')}/>`:
      scr==='import'?html`<${ImportTab} user=${user} toast=${toast}/>`:
      scr==='settings'?html`<${SettingsTab} user=${user} onBack=${()=>setScr('heute')}/>`:
      html`<${PlaceholderTab} id=${scr}/>`}
    <${BottomNav} active=${scr==='settings'?'heute':scr} onNav=${setScr}/>
  </div>`;
}

/* ═══════════════════════════════════════════
   HEUTE TAB
   ═══════════════════════════════════════════ */
function HeuteTab({user,toast,onSettings}){
  const[selDate,setSelDate]=useState(localDate());
  const[dayData,setDayData]=useState(null);const[prevData,setPrevData]=useState(null);
  const[weekData,setWeekData]=useState([]);
  const[loading,setLoading]=useState(true);
  const[wKg,setWKg]=useState(null);const[fatP,setFatP]=useState(null);const[musP,setMusP]=useState(null);
  const[notes,setNotes]=useState('');const[dayType,setDayType]=useState(null);
  const[saved,setSaved]=useState(false);const[saving,setSaving]=useState(false);
  const notesTimer=useRef(null);

  useEffect(()=>{
    setLoading(true);setSaved(false);
    // Week: Sa-Fr containing selDate
    const selD=parseDateLocal(selDate);const dow=selD.getDay();
    const satOff=dow===6?0:-(dow+1); // offset to previous Saturday
    const wkStart=addDays(selDate,satOff);const wkEnd=addDays(wkStart,6);
    Promise.all([dbGetDay(user.id,selDate),dbGetPrevDay(user.id,selDate),dbGetWeek(user.id,wkStart,wkEnd)]).then(([d,p,w])=>{
      setDayData(d);setPrevData(p);setWeekData(w);
      if(d){setWKg(d.weight_kg!=null?d.weight_kg:null);setFatP(d.body_fat_pct!=null?d.body_fat_pct:null);setMusP(d.muscle_pct!=null?d.muscle_pct:null);setNotes(d.notes||'');setDayType(d.day_type||null);if(d.weight_kg!=null)setSaved(true)}
      else{setWKg(null);setFatP(null);setMusP(null);setNotes('');setDayType(null)}
      setLoading(false);
    });
  },[user.id,selDate]);

  const saveBC=async()=>{
    if(wKg==null||wKg<40||wKg>150){toast('Gewicht prüfen');return}
    if(fatP==null||fatP<5||fatP>50){toast('KFA% prüfen');return}
    if(musP==null||musP<20||musP>60){toast('Muskel% prüfen');return}
    setSaving(true);
    const result=await dbUpsertBodyComp(user.id,selDate,wKg,fatP,musP);
    if(result){setDayData(result);setSaved(true);toast('Gespeichert ✓');const p=await dbGetPrevDay(user.id,selDate);setPrevData(p)}
    else{toast('Fehler beim Speichern')}
    setSaving(false);
  };

  const onNotesInput=(e)=>{const v=e.target.value;setNotes(v);clearTimeout(notesTimer.current);notesTimer.current=setTimeout(()=>dbUpsertNotes(user.id,selDate,v),1500)};
  const onDayTypeChange=(dt)=>{setDayType(dt);dbUpsertDayType(user.id,selDate,dt)};
  const goDate=(n)=>setSelDate(d=>addDays(d,n));
  const dt=fmtDateFull(selDate);

  const dWeight=saved&&prevData?.weight_kg!=null&&dayData?.weight_kg!=null?round1(dayData.weight_kg-prevData.weight_kg):null;
  const dFat=saved&&prevData?.fat_mass_kg!=null&&dayData?.fat_mass_kg!=null?round1(dayData.fat_mass_kg-prevData.fat_mass_kg):null;
  const dMus=saved&&prevData?.muscle_mass_kg!=null&&dayData?.muscle_mass_kg!=null?round1(dayData.muscle_mass_kg-prevData.muscle_mass_kg):null;

  const weekDays=useMemo(()=>{
    // Sa-Fr week containing selDate
    const selD=parseDateLocal(selDate);const dow=selD.getDay();
    const satOff=dow===6?0:-(dow+1);const wkStart=addDays(selDate,satOff);
    const days=[];for(let i=0;i<7;i++){const ds=addDays(wkStart,i);const d=parseDateLocal(ds);const wd=['So','Mo','Di','Mi','Do','Fr','Sa'][d.getDay()];const dom=d.getDate();const row=weekData.find(w=>w.date===ds);const future=ds>localDate();days.push({ds,wd,dom,dayType:row?.day_type,hasWeight:row?.weight_kg!=null,isSel:ds===selDate,isToday:ds===localDate(),future})}return days;
  },[selDate,weekData]);

  return html`<div style=${{paddingBottom:110}}>
    <div style=${{padding:'16px 18px 4px'}}>
      <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
        <div style=${{fontSize:13,color:C.muted,fontWeight:500}}>${dt.wd}</div>
        <div style=${{display:'flex',alignItems:'center',gap:8}}>
          <${DayTypePill} type=${dayType}/>
          <button onClick=${onSettings} style=${{color:C.muted,padding:4,display:'flex',alignItems:'center'}}><svg width=18 height=18 viewBox="0 0 24 24" fill=none stroke=currentColor stroke-width=2 stroke-linecap=round><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx=12 cy=12 r=3/></svg></button>
        </div>
      </div>
      <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <h1 style=${{fontSize:30,fontWeight:700,margin:'2px 0 0',letterSpacing:'-0.6px'}}>${dt.full}</h1>
        <div style=${{display:'flex',gap:4}}>
          <button onClick=${()=>goDate(-1)} style=${{width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:18,color:C.muted}}><${IconChevL}/></button>
          ${!isToday(selDate)?html`<button onClick=${()=>setSelDate(localDate())} style=${{height:36,padding:'0 12px',borderRadius:18,fontSize:12,fontWeight:600,color:C.text,background:'#ececea'}}>Heute</button>`:null}
          <button onClick=${()=>goDate(1)} disabled=${isToday(selDate)} style=${{width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:18,color:C.muted,opacity:isToday(selDate)?.3:1}}><${IconChevR}/></button>
        </div>

/* -- Parsers -- */

function parseFddb(csv){
  // Semikolon-getrennt, deutsche Dezimalkommas, kJ-basiert
  // Cols: datetime; name; id; kJ; ?; fat_g; carbs_g; protein_g;
  const lines=csv.trim().split('\n').filter(l=>l.trim());
  const entries=[];
  for(const line of lines){
    const cols=line.split(';').map(c=>c.replace(/^"|"$/g,'').trim());
    if(cols.length<8)continue;
    const dtMatch=cols[0].match(/(\d{2})\.(\d{2})\.(\d{4})\s+(\d{2}):(\d{2})/);
    if(!dtMatch)continue;
    const[,dd,mm,yyyy,hh,mi]=dtMatch;
    let date=`${yyyy}-${mm}-${dd}`;
    // Mitternachts-Korrektur: 00:00-00:15 → Vortag
    if(parseInt(hh)===0&&parseInt(mi)<=15){
      date=addDays(date,-1);
    }
    const kj=parseFloat(cols[3].replace(',','.'))||0;
    const fat=parseFloat(cols[5].replace(',','.'))||0;
    const carbs=parseFloat(cols[6].replace(',','.'))||0;
    const protein=parseFloat(cols[7].replace(',','.'))||0;
    const kcal=Math.round(kj/4.184);
    entries.push({date,kcal,protein,carbs,fat});
  }
  // Group by day
  const byDay={};
  for(const e of entries){
    if(!byDay[e.date])byDay[e.date]={kcal:0,protein:0,carbs:0,fat:0};
    byDay[e.date].kcal+=e.kcal;
    byDay[e.date].protein+=e.protein;
    byDay[e.date].carbs+=e.carbs;
    byDay[e.date].fat+=e.fat;
  }
  // Filter incomplete days (<1600 kcal)
  const days=Object.entries(byDay).filter(([,v])=>v.kcal>=1600).map(([date,v])=>({
    date,kcal:Math.round(v.kcal),protein_g:Math.round(v.protein),carbs_g:Math.round(v.carbs),fat_g:Math.round(v.fat)
  })).sort((a,b)=>a.date.localeCompare(b.date));
  return days;
}

function parseTonnage(csv){
  // Format: date,day,tonnage (from SQL export) or tab-separated
  const lines=csv.trim().split('\n').filter(l=>l.trim());
  const results=[];
  for(const line of lines){
    const sep=line.includes('\t')?'\t':',';
    const cols=line.split(sep).map(c=>c.trim().replace(/^"|"$/g,''));
    if(cols[0]==='date'||!cols[0].match(/^\d{4}-/))continue; // skip header
    const date=cols[0].slice(0,10);
    const tonnage=Math.round(parseFloat(cols[cols.length-1])||0);
    if(tonnage>0)results.push({date,training_volume_kg:tonnage});
  }
  return results;
}

// Plan version from date (for Garmin activities)
function planFromDate(date){
  if(date<'2026-03-01')return'FH';if(date<'2026-04-01')return'v1';if(date<'2026-04-05')return'v2';
  if(date<'2026-04-14')return'v3';if(date<'2026-04-24')return'v4';if(date<'2026-04-27')return'v5';return'v6';
}
// Workout name from day number + plan version
function workoutName(day,plan){
  if(plan==='FH')return'Foundations';
  if(plan==='v1')return['Lower Body','Upper Body','Full Body'][day-1]||'Training';
  const names=['Hinge + Pull','Squat + Push',plan==='v6'?'Heavy Compounds + Shoulders':'Heavy Compounds + Rehab'];
  return names[day-1]||'Training';
}

function parseGarminUDS(jsonText){
  const data=JSON.parse(jsonText);
  const arr=Array.isArray(data)?data:[];
  const today=localDate();
  return arr.filter(d=>d.calendarDate&&d.calendarDate!==today).map(d=>({
    date:d.calendarDate,steps:d.totalSteps||0,kcal_burned:Math.round(d.totalKilocalories||0)
  })).filter(d=>d.steps>0||d.kcal_burned>0);
}

function parseGarminActivities(jsonText){
  const data=JSON.parse(jsonText);
  const activities=(data[0]?.summarizedActivitiesExport)||data;
  const byDay={};
  for(const a of activities){
    if(!a.beginTimestamp)continue;
    const d=new Date(a.beginTimestamp);
    const date=localDate(d);
    const type=a.activityType||'';
    if(!byDay[date])byDay[date]=[];
    byDay[date].push(type);
  }
  return Object.entries(byDay).map(([date,types])=>{
    const parts=[];
    const plan=planFromDate(date);
    const strength=types.filter(t=>t==='strength_training').length;
    if(strength>0)parts.push(plan+' Kraft');
    if(types.includes('volleyball'))parts.push('CnS');
    const others=types.filter(t=>t!=='strength_training'&&t!=='volleyball');
    for(const t of others)parts.push(t.replace(/_/g,' '));
    return{date,training:parts.join(' + ')||'Aktivität',plan_version:plan};
  });
}

function parseGarminCycles(jsonText){
  const data=JSON.parse(jsonText);
  const cycles=(Array.isArray(data)?data:[]).filter(c=>c.startDate).sort((a,b)=>a.startDate.localeCompare(b.startDate));
  const result=[];
  for(let i=0;i<cycles.length;i++){
    const start=cycles[i].startDate;
    const len=cycles[i].actualCycleLength||28;
    for(let d=0;d<len;d++){
      const date=addDays(start,d);
      // Don't go past next cycle start
      if(i<cycles.length-1&&date>=cycles[i+1].startDate)break;
      result.push({date,cycle_day:d+1});
    }
  }
  return result;
}

async function importFddb(uid,days){
  let updated=0,created=0;
  for(const d of days){
    const{data:ex}=await sb.from('daily_tracking').select('id,kcal').eq('user_id',uid).eq('date',d.date).maybeSingle();
    if(ex){
      await sb.from('daily_tracking').update({kcal:d.kcal,protein_g:d.protein_g,carbs_g:d.carbs_g,fat_g:d.fat_g,updated_at:new Date().toISOString()}).eq('id',ex.id);
      updated++;
    }else{
      await sb.from('daily_tracking').insert({user_id:uid,date:d.date,kcal:d.kcal,protein_g:d.protein_g,carbs_g:d.carbs_g,fat_g:d.fat_g,updated_at:new Date().toISOString()});

    }
  }
  return{updated,created};
}

const TONNAGE_SQL=`SELECT
  w.date::date as date,
  w.day,
  w.plan_version,
  w.workout_name,
  ROUND(SUM(COALESCE(s.kg, 0) * COALESCE(s.reps, 0))::numeric, 0) as tonnage
FROM workouts w
JOIN exercise_logs e ON e.workout_id = w.id
JOIN set_logs s ON s.exercise_log_id = e.id
WHERE s.is_warmup = false
GROUP BY w.date::date, w.day, w.plan_version, w.workout_name
ORDER BY date;`;

const DEFAULT_CUTOFF='2026-01-01';

function ImportTab({user,toast}){
  const[active,setActive]=useState(null);
  const[pasted,setPasted]=useState('');
  const[feedback,setFeedback]=useState(null);
  const[importing,setImporting]=useState(false);
  const[logs,setLogs]=useState([]);
  const[garminStatus,setGarminStatus]=useState(null);
  const fileRef=useRef(null);
  const fddbRef=useRef(null);

  // Load cutoff from localStorage
  const getCutoff=()=>{try{return localStorage.getItem('ut_cutoff')||DEFAULT_CUTOFF}catch(e){return DEFAULT_CUTOFF}};

  useEffect(()=>{
    sb.from('import_log').select('*').eq('user_id',user.id).order('imported_at',{ascending:false}).limit(10).then(({data})=>setLogs(data||[]));
  },[user.id]);

  // Filter days by cutoff
  const filterCutoff=(days)=>{const c=getCutoff();return days.filter(d=>d.date>=c)};

  // --- fddb file upload ---
  const handleFddbFile=async(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    setImporting(true);setFeedback(null);
    try{
      const text=await file.text();
      let days=parseFddb(text);
      days=filterCutoff(days);
      if(!days.length){toast('Keine gültigen Tage gefunden (min. 1600 kcal, nach Cut-off)');setImporting(false);return}
      const result=await importFddb(user.id,days);
      await logImport(user.id,'fddb',days,file.name);
      const dates=days.map(d=>d.date).sort();
      setFeedback({source:'fddb',msg:`${days.length} Tage importiert — ${result.updated} aktualisiert, ${result.created} neu.`,range:fmtRange(dates[0],dates[dates.length-1])});
      const{data:newLogs}=await sb.from('import_log').select('*').eq('user_id',user.id).order('imported_at',{ascending:false}).limit(10);
      setLogs(newLogs||[]);
    }catch(e){console.error(e);toast('Fehler: '+e.message)}
    setImporting(false);
    if(fddbRef.current)fddbRef.current.value='';
  };

  // --- Garmin ZIP upload ---
  const handleGarminZip=async(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    setImporting(true);setFeedback(null);setGarminStatus('ZIP wird geladen...');
    try{
      const JSZip=(await import('https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm')).default;
      const zip=await JSZip.loadAsync(file);
      const results=[];let totalDays=0;

      setGarminStatus('Dateien werden gesucht...');

      // Find ALL UDS files (there are multiple, split by date range)
      const udsFiles=Object.keys(zip.files).filter(f=>f.includes('UDSFile_')&&f.endsWith('.json'));
      if(udsFiles.length){
        setGarminStatus(`Schritte & kcal werden importiert (${udsFiles.length} Dateien)...`);
        let allUDS=[];
        for(const uf of udsFiles){
          const text=await zip.files[uf].async('string');
          try{const arr=JSON.parse(text);if(Array.isArray(arr))allUDS=allUDS.concat(arr)}catch(e){}
        }
        // Deduplicate by calendarDate (keep latest)
        const byDate={};for(const d of allUDS){if(d.calendarDate)byDate[d.calendarDate]=d}
        const udsText=JSON.stringify(Object.values(byDate));
        let days=parseGarminUDS(udsText);days=filterCutoff(days);
        if(days.length){const r=await importGarminUDS(user.id,days);results.push(`Schritte: ${days.length} Tage`);totalDays+=days.length;await logImport(user.id,'garmin',days,'UDS')}
      }

      // Find Activities file
      const actFile=Object.keys(zip.files).find(f=>f.includes('summarizedActivities')&&f.endsWith('.json'));
      if(actFile){
        setGarminStatus('Aktivitäten werden importiert...');
        const actText=await zip.files[actFile].async('string');
        let days=parseGarminActivities(actText);days=filterCutoff(days);
        if(days.length){const r=await importGarminActivities(user.id,days);results.push(`Aktivitäten: ${days.length} Tage`);totalDays+=days.length;await logImport(user.id,'garmin',days,'Activities')}
      }

      // Find MenstrualCycles file
      const cycFile=Object.keys(zip.files).find(f=>f.includes('MenstrualCycles')&&f.endsWith('.json'));
      if(cycFile){
        setGarminStatus('Zyklusdaten werden importiert...');
        const cycText=await zip.files[cycFile].async('string');
        let days=parseGarminCycles(cycText);days=filterCutoff(days);
        if(days.length){const r=await importGarminCycles(user.id,days);results.push(`Zyklus: ${days.length} Tage`);totalDays+=days.length;await logImport(user.id,'garmin',days,'MenstrualCycles')}
      }

      if(!results.length){toast('Keine relevanten Dateien im ZIP gefunden')}
      else{
        setFeedback({source:'garmin',msg:`${results.join(' · ')}`,range:`${totalDays} Einträge gesamt`});
        const{data:newLogs}=await sb.from('import_log').select('*').eq('user_id',user.id).order('imported_at',{ascending:false}).limit(10);
        setLogs(newLogs||[]);
      }
    }catch(e){console.error(e);toast('Fehler: '+e.message)}
    setImporting(false);setGarminStatus(null);
    if(fileRef.current)fileRef.current.value='';
  };

  // --- Tonnage paste import ---
  const doTonnageImport=async()=>{
    if(!pasted.trim()){toast('Keine Daten eingefügt');return}
    setImporting(true);setFeedback(null);
    try{
      let days=parseTonnage(pasted);days=filterCutoff(days);
      if(!days.length){toast('Keine Tonnage-Daten gefunden');setImporting(false);return}
      const result=await importTonnage(user.id,days);
      await logImport(user.id,'tonnage',days,'workouts.csv');
      const dates=days.map(d=>d.date).sort();
      setFeedback({source:'tonnage',msg:`${days.length} Tage importiert — ${result.updated} aktualisiert, ${result.created} neu.`,range:fmtRange(dates[0],dates[dates.length-1])});
      const{data:newLogs}=await sb.from('import_log').select('*').eq('user_id',user.id).order('imported_at',{ascending:false}).limit(10);
      setLogs(newLogs||[]);
    }catch(e){console.error(e);toast('Fehler: '+e.message)}
    setImporting(false);
  };

  const copySQL=()=>{navigator.clipboard?.writeText(TONNAGE_SQL).then(()=>toast('SQL kopiert ✓')).catch(()=>toast('Kopieren fehlgeschlagen'))};

  const fmtRange=(s,e)=>{const f=d=>{const p=d.split('-');return p[2]+'.'+p[1]+'.'};return s===e?f(s):f(s)+' – '+f(e)};

  const cutoff=getCutoff();
  const cutoffFmt=cutoff.split('-').reverse().join('.');

  return html`<div style=${{paddingBottom:110}}>
    <div style=${{padding:'16px 18px 4px'}}>
      <h1 style=${{fontSize:28,fontWeight:700,letterSpacing:'-0.5px'}}>Import</h1>
      <div style=${{fontSize:13,color:C.muted,marginTop:4}}>1× pro Woche reicht. Cut-off: ab ${cutoffFmt}</div>
    </div>

    <div style=${{padding:'0 18px'}}>

      <!-- fddb -->
      <${SectionLabel}>Ernährung<//>
      <${Card} padding=${0}>
        <div onClick=${()=>!importing&&fddbRef.current?.click()} style=${{display:'flex',alignItems:'center',gap:14,padding:14,cursor:'pointer'}}>
          <div style=${{width:44,height:44,borderRadius:12,background:'#f4f4f2',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>🍎</div>
          <div style=${{flex:1,minWidth:0}}>
            <div style=${{fontSize:15,fontWeight:600}}>fddb CSV importieren</div>
            <div style=${{fontSize:11,color:C.muted,marginTop:2}}>fddb Tagebuch → Datei → Exportieren</div>
          </div>
          <div style=${{fontSize:13,color:C.muted}}>📄</div>
        </div>
        <input ref=${fddbRef} type=file accept=".csv,.txt" onChange=${handleFddbFile} style=${{display:'none'}}/>
        ${feedback?.source==='fddb'?html`<div style=${{padding:'0 14px 14px'}}><div style=${{padding:12,background:'rgba(31,122,77,0.08)',border:'1px solid rgba(31,122,77,0.20)',borderRadius:10,fontSize:13,color:C.good,fontWeight:600}}>✓ ${feedback.msg}<br/><span style=${{fontWeight:500,color:C.muted,fontSize:11}}>${feedback.range}</span></div></div>`:null}
      <//>

      <!-- Garmin -->
      <${SectionLabel}>Aktivität & Zyklus<//>
      <${Card} padding=${0}>
        <div onClick=${()=>!importing&&fileRef.current?.click()} style=${{display:'flex',alignItems:'center',gap:14,padding:14,cursor:'pointer'}}>
          <div style=${{width:44,height:44,borderRadius:12,background:'#f4f4f2',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>⌚</div>
          <div style=${{flex:1,minWidth:0}}>
            <div style=${{fontSize:15,fontWeight:600}}>Garmin ZIP importieren</div>
            <div style=${{fontSize:11,color:C.muted,marginTop:2}}>Schritte, Aktivitäten, Zyklus — alles aus einer Datei</div>
          </div>
          <div style=${{fontSize:13,color:C.muted}}>📦</div>
        </div>
        <input ref=${fileRef} type=file accept=".zip" onChange=${handleGarminZip} style=${{display:'none'}}/>
        ${garminStatus?html`<div style=${{padding:'0 14px 14px'}}><div style=${{padding:12,background:'#f4f4f2',borderRadius:10,fontSize:13,color:C.muted}}>${garminStatus}</div></div>`:null}
        ${feedback?.source==='garmin'?html`<div style=${{padding:'0 14px 14px'}}><div style=${{padding:12,background:'rgba(31,122,77,0.08)',border:'1px solid rgba(31,122,77,0.20)',borderRadius:10,fontSize:13,color:C.good,fontWeight:600}}>✓ ${feedback.msg}<br/><span style=${{fontWeight:500,color:C.muted,fontSize:11}}>${feedback.range}</span></div></div>`:null}
      <//>

      <!-- Tonnage -->
      <${SectionLabel}>Training Tonnage<//>
      <${Card}>
        <div style=${{fontSize:13,color:C.muted,marginBottom:10}}>
          SQL im <span style=${{fontWeight:600}}>Workout Tracker</span> Supabase ausführen, Ergebnis als CSV kopieren:
        </div>
        <div style=${{position:'relative'}}>
          <pre style=${{background:'#1a1a1a',color:'#e0e0de',padding:'14px 14px 14px 14px',borderRadius:12,fontSize:10,fontFamily:'ui-monospace, SF Mono, Menlo, monospace',overflow:'auto',maxHeight:160,whiteSpace:'pre-wrap',lineHeight:1.5,margin:0}}>${TONNAGE_SQL}</pre>
          <button onClick=${copySQL} style=${{position:'absolute',top:8,right:8,padding:'4px 10px',background:'rgba(255,255,255,0.15)',color:'#fff',border:'none',borderRadius:8,fontSize:11,fontWeight:600,cursor:'pointer'}}>Kopieren</button>
        </div>
        <div style=${{marginTop:12}}>
          <textarea value=${pasted} onInput=${e=>setPasted(e.target.value)} placeholder="date,day,plan_version,workout_name,tonnage\n2026-05-07,1,v6,Hinge + Pull,11240"
            style=${{width:'100%',minHeight:80,background:'#fafaf8',border:'1px solid '+C.border,borderRadius:12,padding:12,fontSize:11,fontFamily:'ui-monospace, SF Mono, Menlo, monospace',resize:'vertical',outline:'none',boxSizing:'border-box',color:C.text}}></textarea>
          <button onClick=${doTonnageImport} disabled=${!pasted.trim()||importing}
            style=${{marginTop:8,width:'100%',padding:'12px 16px',background:C.text,color:'#fff',border:'none',borderRadius:12,fontSize:14,fontWeight:600,cursor:pasted.trim()&&!importing?'pointer':'not-allowed',opacity:pasted.trim()&&!importing?1:.4}}>
            ${importing?'Importiere...':'Importieren'}
          </button>
        </div>
        ${feedback?.source==='tonnage'?html`<div style=${{marginTop:12,padding:12,background:'rgba(31,122,77,0.08)',border:'1px solid rgba(31,122,77,0.20)',borderRadius:10,fontSize:13,color:C.good,fontWeight:600}}>✓ ${feedback.msg}<br/><span style=${{fontWeight:500,color:C.muted,fontSize:11}}>${feedback.range}</span></div>`:null}
      <//>

      ${logs.length?html`
        <${SectionLabel}>Letzte Imports<//>
        <${Card} padding=${0}>
          ${logs.map((l,i)=>html`<div key=${l.id} style=${{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',borderBottom:i===logs.length-1?'none':'1px solid '+C.border}}>
            <div style=${{fontSize:10,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:0.4,width:60,flexShrink:0}}>${l.source}</div>
            <div style=${{flex:1,minWidth:0}}>
              <div style=${{fontSize:12,fontWeight:600}}>${l.records_count} ${l.records_count===1?'Eintrag':'Einträge'} · ${fmtRange(l.date_range_start,l.date_range_end)}</div>
              <div style=${{fontSize:10,color:C.muted,marginTop:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>${l.raw_filename||''}</div>
            </div>
            <div style=${{fontSize:11,color:C.muted,fontVariantNumeric:'tabular-nums'}}>${new Date(l.imported_at).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</div>
          </div>`)}
        <//>
      `:null}
    </div>
  </div>`;
}

/* Placeholder */
function PlaceholderTab({id}){const labels={dashboard:'Dashboard',tabelle:'Tabelle'};const icons={dashboard:'📊',tabelle:'📋'};return html`<div style=${{paddingBottom:110,minHeight:'100dvh'}}><div style=${{padding:'60px 20px',textAlign:'center'}}><div style=${{fontSize:48,marginBottom:16}}>${icons[id]}</div><h2 style=${{fontSize:22,fontWeight:700,marginBottom:8}}>${labels[id]}</h2><div style=${{fontSize:14,color:C.muted}}>Kommt in Phase 3</div><div style=${{fontSize:13,color:C.muted,marginTop:8}}>${id==='dashboard'?'Charts, Trends und KPI-Cards':'Sheet-Layout mit allen Daten'}</div></div></div>`}

/* Settings */
function SettingsTab({user,onBack}){
  const[cutoff,setCutoff]=useState(()=>{try{return localStorage.getItem('ut_cutoff')||'2026-01-01'}catch(e){return'2026-01-01'}});
  const saveCutoff=(v)=>{setCutoff(v);try{localStorage.setItem('ut_cutoff',v)}catch(e){}};
  return html`<div style=${{paddingBottom:40,minHeight:'100dvh'}}>
  <div style=${{padding:'20px 18px',display:'flex',alignItems:'center',gap:12}}>
    <button onClick=${onBack} style=${{color:C.muted,padding:4}}><${IconChevL}/></button>
    <h1 style=${{fontSize:22,fontWeight:700}}>Einstellungen</h1>
  </div>
  <div style=${{padding:'0 18px',display:'flex',flexDirection:'column',gap:12}}>
    <${Card}>
      <div style=${{fontSize:13,color:C.muted,marginBottom:4}}>Eingeloggt als</div>
      <div style=${{fontSize:15,fontWeight:600}}>${user?.email||'—'}</div>
    <//>
    <${Card}>
      <div style=${{fontSize:13,color:C.muted,marginBottom:8}}>Import Cut-off Datum</div>
      <div style=${{fontSize:12,color:C.muted,marginBottom:8}}>Daten vor diesem Datum werden beim Import ignoriert.</div>
      <input type=date value=${cutoff} onChange=${e=>saveCutoff(e.target.value)}
        style=${{width:'100%',height:44,background:'#fafaf8',border:'1px solid '+C.border,borderRadius:12,padding:'0 12px',fontSize:15,color:C.text}}/>
    <//>
    <${Card} onClick=${async()=>{try{const regs=await navigator.serviceWorker?.getRegistrations();for(const r of(regs||[]))await r.unregister();const keys=await caches.keys();for(const k of keys)await caches.delete(k)}catch(e){}location.reload(true)}} style=${{cursor:'pointer'}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style=${{fontSize:14}}>App aktualisieren</span><span style=${{fontSize:11,color:C.muted}}>Cache leeren</span></div>
    <//>
    <${Card} onClick=${()=>sb.auth.signOut()} style=${{cursor:'pointer',textAlign:'center'}}>
      <span style=${{fontSize:14,color:C.warnHigh,fontWeight:600}}>Abmelden</span>
    <//>
  </div>
</div>`}

render(html`<${App}/>`,document.getElementById('root'));
</script>
